<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:       #141210;
    --ink-2:     #4a4640;
    --ink-3:     #9a948e;
    --paper:     #f8f5f0;
    --paper-2:   #ede9e2;
    --paper-3:   #e0dbd2;
    --rule:      #d5cfc6;
    --accent:    #c8510a;
    --accent-2:  #e07040;
    --success:   #2a7a4b;
    --danger:    #b83232;
    --warning:   #b87322;
    --radius:    10px;
    --shadow:    0 2px 12px rgba(20,18,16,.08);
    --shadow-lg: 0 8px 40px rgba(20,18,16,.14);
    --serif:     'DM Serif Display', Georgia, serif;
    --sans:      'DM Sans', system-ui, sans-serif;
    --transition: 180ms ease;
  }
  html { font-size: 16px; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }
  h1,h2,h3,h4 { font-family: var(--serif); font-weight: 400; line-height: 1.2; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: var(--sans); cursor: pointer; border: none; transition: background var(--transition), opacity var(--transition), transform var(--transition); }
  button:active { transform: scale(.98); }
  input, select, textarea {
    font-family: var(--sans);
    font-size: .9rem;
    width: 100%;
    padding: .55rem .75rem;
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
    transition: border-color var(--transition), box-shadow var(--transition);
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,81,10,.1);
  }
  input::placeholder { color: var(--ink-3); }
  label { font-size: .8rem; font-weight: 500; color: var(--ink-2); letter-spacing: .03em; text-transform: uppercase; display: block; margin-bottom: .35rem; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 1rem;
    background: rgba(248,245,240,.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
    padding: 0 1.5rem; height: 56px;
  }
  #topbar .brand { font-family: var(--serif); font-size: 1.35rem; color: var(--ink); letter-spacing: -.01em; flex-shrink: 0; }
  #topbar .brand span { color: var(--accent); }
  #nav { display: flex; gap: .25rem; flex: 1; }
  #nav button {
    padding: .35rem .8rem; border-radius: 6px; font-size: .85rem; font-weight: 500;
    background: transparent; color: var(--ink-2);
  }
  #nav button:hover { background: var(--paper-2); color: var(--ink); }
  #nav button.active { background: var(--ink); color: var(--paper); }
  .topbar-right { display: flex; align-items: center; gap: .75rem; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 600; letter-spacing: .05em; flex-shrink: 0;
  }
  .avatar.admin-avatar { background: var(--accent); }
  .user-meta { line-height: 1.2; }
  .user-meta .uname { font-size: .85rem; font-weight: 500; }
  .user-meta .urole { font-size: .72rem; color: var(--ink-3); text-transform: capitalize; }
  .btn-sm {
    padding: .3rem .7rem; border-radius: 6px; font-size: .8rem; font-weight: 500;
    background: var(--paper-2); color: var(--ink-2);
    border: 1px solid var(--rule);
  }
  .btn-sm:hover { background: var(--paper-3); color: var(--ink); }

  /* ── Main content ── */
  #main { flex: 1; padding: 2rem 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ── Auth screen ── */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--paper);
    padding: 1.5rem;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: #fff; border: 1px solid var(--rule);
    border-radius: 16px; padding: 2.5rem 2rem;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .35s ease both;
  }
  .auth-brand { font-family: var(--serif); font-size: 2rem; color: var(--ink); margin-bottom: .25rem; }
  .auth-brand span { color: var(--accent); font-style: italic; }
  .auth-sub { font-size: .875rem; color: var(--ink-3); margin-bottom: 2rem; }
  .auth-tabs { display: flex; gap: 0; border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; margin-bottom: 1.75rem; }
  .auth-tabs button {
    flex: 1; padding: .55rem; font-size: .85rem; font-weight: 500;
    background: transparent; color: var(--ink-3);
    border-radius: 0;
  }
  .auth-tabs button.active { background: var(--ink); color: #fff; }
  .form-group { margin-bottom: 1.1rem; }
  .btn-primary {
    width: 100%; padding: .7rem; border-radius: 8px; font-size: .9rem; font-weight: 500;
    background: var(--ink); color: #fff; margin-top: .5rem;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .error-msg { font-size: .82rem; color: var(--danger); margin-top: .75rem; padding: .5rem .75rem; background: rgba(184,50,50,.06); border-radius: 6px; }
  .hint-box { margin-top: 1.25rem; background: var(--paper-2); border-radius: 8px; padding: .875rem 1rem; font-size: .8rem; color: var(--ink-2); line-height: 1.8; }
  .hint-box strong { color: var(--ink); }

  /* ── Page header ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
  .page-header h1 { font-size: 1.9rem; }
  .page-header p { font-size: .9rem; color: var(--ink-3); margin-top: .15rem; }
  .btn-accent {
    padding: .55rem 1.1rem; border-radius: 8px; font-size: .875rem; font-weight: 500;
    background: var(--accent); color: #fff; white-space: nowrap;
  }
  .btn-accent:hover { background: var(--accent-2); }
  .btn-danger {
    padding: .3rem .7rem; border-radius: 6px; font-size: .78rem;
    background: rgba(184,50,50,.08); color: var(--danger);
    border: 1px solid rgba(184,50,50,.2);
  }
  .btn-danger:hover { background: rgba(184,50,50,.15); }
  .btn-ghost {
    padding: .3rem .7rem; border-radius: 6px; font-size: .78rem;
    background: var(--paper-2); color: var(--ink-2);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { background: var(--paper-3); }

  /* ── Stat cards ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .875rem; margin-bottom: 2rem; }
  .stat-card {
    background: #fff; border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
  }
  .stat-label { font-size: .75rem; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
  .stat-value { font-family: var(--serif); font-size: 1.6rem; color: var(--ink); }
  .stat-sub { font-size: .78rem; color: var(--ink-3); margin-top: .2rem; }

  /* ── Charts section ── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  @media(max-width:640px){ .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: #fff; border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 1.25rem;
  }
  .chart-title { font-size: .8rem; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1rem; }
  .bar-row { display: flex; align-items: center; gap: .65rem; margin-bottom: .55rem; }
  .bar-label { font-size: .8rem; color: var(--ink-2); width: 90px; flex-shrink: 0; text-transform: capitalize; }
  .bar-track { flex: 1; height: 8px; background: var(--paper-2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .bar-amount { font-size: .78rem; color: var(--ink-2); width: 68px; text-align: right; flex-shrink: 0; }

  /* ── Month chart ── */
  .month-bars { display: flex; align-items: flex-end; gap: .4rem; height: 100px; }
  .month-col { display: flex; flex-direction: column; align-items: center; gap: .3rem; flex: 1; }
  .month-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .7; transition: opacity var(--transition); min-height: 4px; }
  .month-bar:hover { opacity: 1; }
  .month-label { font-size: .65rem; color: var(--ink-3); }

  /* ── Filters ── */
  .filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .filters select, .filters input[type=month] { width: auto; font-size: .82rem; padding: .4rem .65rem; }
  .filter-clear { font-size: .8rem; color: var(--accent); background: none; border: none; padding: .4rem 0; cursor: pointer; }

  /* ── Table ── */
  .table-wrap { background: #fff; border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead { background: var(--paper-2); }
  th { padding: .65rem 1rem; text-align: left; font-size: .72rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }
  td { padding: .7rem 1rem; border-top: 1px solid var(--rule); vertical-align: middle; }
  tr:hover td { background: var(--paper); }
  .amt-cell { font-family: var(--serif); font-size: 1rem; }
  .cat-badge {
    display: inline-flex; align-items: center; gap: .3rem;
    padding: .15rem .55rem; border-radius: 100px; font-size: .75rem; font-weight: 500;
    text-transform: capitalize;
  }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .actions { display: flex; gap: .4rem; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--ink-3); }
  .empty-state .empty-icon { font-size: 2rem; margin-bottom: .75rem; }
  .empty-state p { font-size: .9rem; }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(20,18,16,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; padding: 1rem;
    animation: fadeIn .15s ease both;
  }
  .modal {
    background: #fff; border-radius: 14px; padding: 1.75rem;
    width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .2s ease both;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .modal-header h2 { font-size: 1.3rem; }
  .modal-close { background: var(--paper-2); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 1rem; color: var(--ink-2); display: flex; align-items: center; justify-content: center; line-height: 1; }
  .modal-close:hover { background: var(--paper-3); }
  .modal .form-group { margin-bottom: .9rem; }
  .modal-footer { display: flex; gap: .6rem; margin-top: 1.25rem; }
  .modal-footer button { flex: 1; padding: .65rem; border-radius: 8px; font-size: .875rem; font-weight: 500; }
  .btn-save { background: var(--ink); color: #fff; }
  .btn-save:hover { background: var(--accent); }
  .btn-cancel { background: var(--paper-2); color: var(--ink-2); border: 1px solid var(--rule); }

  /* ── Admin ── */
  .admin-tabs { display: flex; gap: .25rem; margin-bottom: 1.75rem; background: var(--paper-2); padding: .25rem; border-radius: 10px; width: fit-content; }
  .admin-tabs button {
    padding: .45rem 1rem; border-radius: 8px; font-size: .85rem; font-weight: 500;
    background: transparent; color: var(--ink-2);
  }
  .admin-tabs button.active { background: #fff; color: var(--ink); box-shadow: var(--shadow); }
  .user-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .user-card {
    background: #fff; border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    display: flex; flex-direction: column; gap: .65rem;
  }
  .user-card-top { display: flex; align-items: center; gap: .75rem; }
  .user-card-info { flex: 1; }
  .user-card-info .uname { font-weight: 500; font-size: .9rem; }
  .user-card-info .email { font-size: .78rem; color: var(--ink-3); }
  .role-badge {
    font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
    padding: .15rem .5rem; border-radius: 100px;
  }
  .role-badge.admin { background: rgba(200,81,10,.1); color: var(--accent); }
  .role-badge.user  { background: var(--paper-2); color: var(--ink-3); }
  .user-card-stats { display: flex; gap: 1rem; }
  .user-stat { font-size: .78rem; color: var(--ink-3); }
  .user-stat strong { color: var(--ink); font-size: .85rem; }
  .user-card-actions { display: flex; gap: .5rem; }

  /* ── Donut ── */
  .donut-wrap { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
  .donut-legend { display: flex; flex-direction: column; gap: .45rem; }
  .legend-row { display: flex; align-items: center; gap: .5rem; font-size: .8rem; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { color: var(--ink-2); width: 88px; text-transform: capitalize; }
  .legend-val  { color: var(--ink); font-weight: 500; }

  /* ── Toast ── */
  #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .5rem; }
  .toast {
    padding: .65rem 1rem; border-radius: 8px; font-size: .85rem; font-weight: 500;
    background: var(--ink); color: #fff;
    box-shadow: var(--shadow-lg);
    animation: slideIn .2s ease both;
    max-width: 300px;
  }
  .toast.success { background: var(--success); }
  .toast.error   { background: var(--danger); }

  /* ── Responsive ── */
  @media(max-width:640px){
    #topbar { padding: 0 1rem; }
    #main   { padding: 1.25rem 1rem; }
    #nav button .nav-label { display: none; }
    table { font-size: .8rem; }
    th, td { padding: .55rem .65rem; }
  }

  /* ── Animations ── */
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp  { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .fade-up { animation: fadeUp .3s ease both; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const API = '';   // same origin; change to 'http://localhost:8000' if running separately

/* ============================================================
   CATEGORY META
   ============================================================ */
const CATS = {
  food:          { color:'#c8510a', bg:'rgba(200,81,10,.1)'   },
  transport:     { color:'#2a6db8', bg:'rgba(42,109,184,.1)'  },
  housing:       { color:'#6b4ab8', bg:'rgba(107,74,184,.1)'  },
  health:        { color:'#b83264', bg:'rgba(184,50,100,.1)'  },
  entertainment: { color:'#b87322', bg:'rgba(184,115,34,.1)'  },
  shopping:      { color:'#b84832', bg:'rgba(184,72,50,.1)'   },
  utilities:     { color:'#2a7a4b', bg:'rgba(42,122,75,.1)'   },
  other:         { color:'#737068', bg:'rgba(115,112,104,.1)' },
};

/* ============================================================
   STATE
   ============================================================ */
let state = {
  user: null,
  token: null,
  view: 'dashboard',
  expenses: [],
  summary: null,
  users: [],
  modal: null,          // { type, data }
  filter: { category: '', month: '' },
  adminTab: 'users',
  loading: false,
};

function loadSession() {
  try {
    const raw = localStorage.getItem('ledger_session');
    if (raw) { const s = JSON.parse(raw); state.user = s.user; state.token = s.token; }
  } catch {}
}
function saveSession() {
  if (state.token) localStorage.setItem('ledger_session', JSON.stringify({ user: state.user, token: state.token }));
  else             localStorage.removeItem('ledger_session');
}

/* ============================================================
   API HELPERS
   ============================================================ */
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

/* ============================================================
   FORMAT HELPERS
   ============================================================ */
const fmt = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
const fmtDate = d => { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; };
function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

/* ============================================================
   DATA FETCH
   ============================================================ */
async function fetchDashboard() {
  const p = state.filter;
  let qs = '';
  if (p.category) qs += `?category=${p.category}`;
  if (p.month)    qs += (qs ? '&' : '?') + `month=${p.month}`;
  const [expenses, summary] = await Promise.all([
    api('GET', `/api/expenses/${qs}`),
    api('GET', `/api/expenses/summary${qs}`),
  ]);
  state.expenses = expenses || [];
  state.summary  = summary;
}

async function fetchUsers() {
  state.users = await api('GET', '/api/users/') || [];
}

/* ============================================================
   AUTH ACTIONS
   ============================================================ */
async function doLogin(username, password) {
  const data = await api('POST', '/api/auth/login', { username, password });
  state.token = data.access_token;
  state.user  = data.user;
  saveSession();
  await fetchDashboard();
  render();
}

async function doRegister(form) {
  await api('POST', '/api/users/register', form);
  toast('Account created! Please sign in.');
}

function doLogout() {
  state.token = null; state.user = null;
  state.expenses = []; state.summary = null; state.users = [];
  saveSession();
  render();
}

/* ============================================================
   EXPENSE ACTIONS
   ============================================================ */
async function createExpense(form) {
  await api('POST', '/api/expenses/', form);
  toast('Expense added');
  await fetchDashboard();
  state.modal = null;
  render();
}

async function updateExpense(id, form) {
  await api('PUT', `/api/expenses/${id}`, form);
  toast('Expense updated');
  await fetchDashboard();
  state.modal = null;
  render();
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  await api('DELETE', `/api/expenses/${id}`);
  toast('Expense deleted');
  await fetchDashboard();
  render();
}

/* ============================================================
   USER ACTIONS (admin)
   ============================================================ */
async function deleteUser(id) {
  if (!confirm('Delete this user and all their expenses?')) return;
  await api('DELETE', `/api/users/${id}`);
  toast('User deleted');
  await Promise.all([fetchUsers(), fetchDashboard()]);
  render();
}

/* ============================================================
   NAVIGATE
   ============================================================ */
async function navigate(view) {
  state.view = view;
  state.filter = { category: '', month: '' };
  if (view === 'dashboard' || view === 'expenses') await fetchDashboard();
  if (view === 'admin') { await fetchUsers(); await fetchDashboard(); }
  render();
}

/* ============================================================
   RENDER ROOT
   ============================================================ */
function render() {
  const app = document.getElementById('app');
  if (!state.user) { app.innerHTML = renderAuth(); bindAuth(); return; }
  app.innerHTML = renderApp();
  bindApp();
}

/* ============================================================
   AUTH SCREEN
   ============================================================ */
let authTab = 'login';
function renderAuth() {
  return `
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">Le<span>dger</span></div>
      <p class="auth-sub">Personal financial management</p>
      <div class="auth-tabs">
        <button id="tab-login"  class="${authTab==='login'  ? 'active':''}" onclick="switchAuthTab('login')">Sign in</button>
        <button id="tab-signup" class="${authTab==='signup' ? 'active':''}" onclick="switchAuthTab('signup')">Register</button>
      </div>
      ${authTab === 'login' ? renderLoginForm() : renderRegisterForm()}
      <div class="hint-box">
        <strong>Demo accounts</strong><br>
        admin / admin123 &nbsp;·&nbsp; alice / alice123 &nbsp;·&nbsp; bob / bob123
      </div>
    </div>
  </div>`;
}
function renderLoginForm() {
  return `
  <div id="login-form">
    <div class="form-group"><label>Username or email</label><input id="l-user" type="text" autocomplete="username" /></div>
    <div class="form-group"><label>Password</label><input id="l-pass" type="password" autocomplete="current-password" /></div>
    <div id="auth-err" class="error-msg" style="display:none"></div>
    <button class="btn-primary" id="btn-login">Sign in</button>
  </div>`;
}
function renderRegisterForm() {
  return `
  <div id="register-form">
    <div class="form-group"><label>Full name</label><input id="r-name" type="text" /></div>
    <div class="form-group"><label>Username</label><input id="r-user" type="text" autocomplete="username" /></div>
    <div class="form-group"><label>Email</label><input id="r-email" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="r-pass" type="password" autocomplete="new-password" /></div>
    <div id="auth-err" class="error-msg" style="display:none"></div>
    <button class="btn-primary" id="btn-register">Create account</button>
  </div>`;
}
function switchAuthTab(tab) { authTab = tab; render(); }

function bindAuth() {
  const err = el => { const d = document.getElementById('auth-err'); if(d){d.style.display='block';d.textContent=el;} };
  const clearErr = () => { const d = document.getElementById('auth-err'); if(d) d.style.display='none'; };

  const loginBtn = document.getElementById('btn-login');
  if (loginBtn) {
    const go = async () => {
      clearErr();
      const u = document.getElementById('l-user').value.trim();
      const p = document.getElementById('l-pass').value;
      if (!u || !p) { err('Please fill in all fields'); return; }
      loginBtn.disabled = true; loginBtn.textContent = 'Signing in…';
      try { await doLogin(u, p); }
      catch(e) { err(e.message); loginBtn.disabled=false; loginBtn.textContent='Sign in'; }
    };
    loginBtn.addEventListener('click', go);
    document.getElementById('l-pass').addEventListener('keydown', e => e.key==='Enter' && go());
  }

  const regBtn = document.getElementById('btn-register');
  if (regBtn) {
    regBtn.addEventListener('click', async () => {
      clearErr();
      const name  = document.getElementById('r-name').value.trim();
      const uname = document.getElementById('r-user').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const pass  = document.getElementById('r-pass').value;
      if (!name||!uname||!email||!pass) { err('Please fill in all fields'); return; }
      if (pass.length < 6) { err('Password must be at least 6 characters'); return; }
      regBtn.disabled=true; regBtn.textContent='Creating account…';
      try {
        await doRegister({ full_name: name, username: uname, email, password: pass });
        authTab = 'login'; render();
      } catch(e) { err(e.message); regBtn.disabled=false; regBtn.textContent='Create account'; }
    });
  }
}

/* ============================================================
   MAIN APP
   ============================================================ */
function renderApp() {
  return `
  <div id="topbar">
    <div class="brand">Le<span>dger</span></div>
    <nav id="nav">
      <button class="${state.view==='dashboard'?'active':''}" onclick="navigate('dashboard')"><span class="nav-label">Dashboard</span></button>
      <button class="${state.view==='expenses'?'active':''}" onclick="navigate('expenses')"><span class="nav-label">Expenses</span></button>
      ${state.user.role==='admin' ? `<button class="${state.view==='admin'?'active':''}" onclick="navigate('admin')"><span class="nav-label">Admin</span></button>` : ''}
    </nav>
    <div class="topbar-right">
      <div class="avatar ${state.user.role==='admin'?'admin-avatar':''}">${initials(state.user.full_name)}</div>
      <div class="user-meta">
        <div class="uname">${state.user.full_name}</div>
        <div class="urole">${state.user.role}</div>
      </div>
      <button class="btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div id="main" class="fade-up">
    ${renderView()}
  </div>
  ${state.modal ? renderModal() : ''}`;
}

function renderView() {
  if (state.view === 'dashboard') return renderDashboard();
  if (state.view === 'expenses')  return renderExpenses();
  if (state.view === 'admin')     return renderAdmin();
  return '';
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard() {
  const s = state.summary;
  if (!s) return '<p style="color:var(--ink-3)">Loading…</p>';
  const months = Object.entries(s.by_month);
  const maxM   = Math.max(...months.map(([,v])=>v), 1);
  const catEntries = Object.entries(s.by_category).sort((a,b)=>b[1]-a[1]);
  const maxC = catEntries[0]?.[1] || 1;
  const title = state.user.role === 'admin' ? 'All Users Overview' : `${state.user.full_name}'s Overview`;

  return `
  <div class="page-header">
    <div>
      <h1>${title}</h1>
      <p>${state.filter.month || 'All time'} · ${s.count} transaction${s.count!==1?'s':''}</p>
    </div>
    <button class="btn-accent" onclick="openModal('add')">+ Add expense</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total spent</div><div class="stat-value">${fmt(s.total)}</div></div>
    <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value">${s.count}</div></div>
    <div class="stat-card"><div class="stat-label">Top category</div>
      <div class="stat-value" style="font-size:1.1rem;text-transform:capitalize">${catEntries[0]?.[0] || '—'}</div>
      <div class="stat-sub">${catEntries[0] ? fmt(catEntries[0][1]) : ''}</div>
    </div>
    <div class="stat-card"><div class="stat-label">Active months</div><div class="stat-value">${months.length}</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Spending by category</div>
      ${catEntries.length ? catEntries.map(([cat, val]) => `
        <div class="bar-row">
          <div class="bar-label"><span class="cat-dot" style="background:${CATS[cat]?.color||'#888'};display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px"></span>${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(val/maxC*100).toFixed(1)}%;background:${CATS[cat]?.color||'#888'}"></div></div>
          <div class="bar-amount">${fmt(val)}</div>
        </div>`).join('') : '<p style="color:var(--ink-3);font-size:.85rem">No data</p>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">Monthly spending</div>
      ${months.length ? `
        <div class="month-bars">
          ${months.slice(-8).map(([m, v]) => `
            <div class="month-col">
              <div class="month-bar" style="height:${Math.max(4,(v/maxM*90)).toFixed(0)}px" title="${m}: ${fmt(v)}"></div>
              <div class="month-label">${m.slice(5)}</div>
            </div>`).join('')}
        </div>` : '<p style="color:var(--ink-3);font-size:.85rem">No data</p>'}
    </div>
  </div>

  <div class="chart-card" style="margin-bottom:0">
    <div class="chart-title">Recent transactions</div>
    ${renderExpenseTable(state.expenses.slice(0, 8), false)}
  </div>`;
}

/* ============================================================
   EXPENSES PAGE
   ============================================================ */
function renderExpenses() {
  const months = [...new Set(state.expenses.map(e=>e.date.slice(0,7)))].sort().reverse();
  return `
  <div class="page-header">
    <div><h1>Expenses</h1><p>${state.expenses.length} record${state.expenses.length!==1?'s':''}</p></div>
    <button class="btn-accent" onclick="openModal('add')">+ Add expense</button>
  </div>
  <div class="filters">
    <select onchange="applyFilter('category', this.value)">
      <option value="">All categories</option>
      ${Object.keys(CATS).map(c=>`<option value="${c}" ${state.filter.category===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
    </select>
    <select onchange="applyFilter('month', this.value)">
      <option value="">All months</option>
      ${months.map(m=>`<option value="${m}" ${state.filter.month===m?'selected':''}>${m}</option>`).join('')}
    </select>
    ${(state.filter.category||state.filter.month) ? `<button class="filter-clear" onclick="clearFilters()">Clear filters</button>` : ''}
  </div>
  ${renderExpenseTable(state.expenses, true)}`;
}

function renderExpenseTable(list, showActions) {
  if (!list.length) return `<div class="empty-state"><div class="empty-icon">📋</div><p>No expenses found</p></div>`;
  const isAdmin = state.user?.role === 'admin';
  return `
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Date</th>
        <th>Description</th>
        <th>Category</th>
        ${isAdmin ? '<th>User</th>' : ''}
        <th>Amount</th>
        ${showActions ? '<th></th>' : ''}
      </tr></thead>
      <tbody>
        ${list.map(e => {
          const cat = CATS[e.category] || CATS.other;
          return `<tr>
            <td style="color:var(--ink-3);font-size:.82rem;white-space:nowrap">${fmtDate(e.date)}</td>
            <td>${e.description || '<span style="color:var(--ink-3)">—</span>'}</td>
            <td><span class="cat-badge" style="background:${cat.bg};color:${cat.color}"><span class="cat-dot" style="background:${cat.color}"></span>${e.category}</span></td>
            ${isAdmin ? `<td style="font-size:.82rem;color:var(--ink-2)">${e.full_name}</td>` : ''}
            <td class="amt-cell">${fmt(e.amount)}</td>
            ${showActions ? `<td><div class="actions">
              <button class="btn-ghost" onclick="openModal('edit', ${JSON.stringify(e).replace(/"/g,'&quot;')})">Edit</button>
              <button class="btn-danger" onclick="deleteExpense(${e.id})">Delete</button>
            </div></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

async function applyFilter(key, val) {
  state.filter[key] = val;
  await fetchDashboard();
  render();
}
async function clearFilters() {
  state.filter = { category: '', month: '' };
  await fetchDashboard();
  render();
}

/* ============================================================
   ADMIN
   ============================================================ */
function renderAdmin() {
  return `
  <div class="page-header">
    <div><h1>Admin Panel</h1><p>Manage users and all expenses</p></div>
  </div>
  <div class="admin-tabs">
    <button class="${state.adminTab==='users'?'active':''}" onclick="setAdminTab('users')">Users</button>
    <button class="${state.adminTab==='expenses'?'active':''}" onclick="setAdminTab('expenses')">All Expenses</button>
  </div>
  ${state.adminTab === 'users' ? renderUserCards() : renderExpenseTable(state.expenses, true)}`;
}

function renderUserCards() {
  if (!state.users.length) return '<p style="color:var(--ink-3)">No users</p>';
  const expByUser = {};
  state.expenses.forEach(e => {
    expByUser[e.user_id] = expByUser[e.user_id] || { count: 0, total: 0 };
    expByUser[e.user_id].count++;
    expByUser[e.user_id].total += e.amount;
  });
  return `<div class="user-cards">
    ${state.users.map(u => {
      const stats = expByUser[u.id] || { count: 0, total: 0 };
      const isSelf = u.id === state.user.id;
      return `<div class="user-card">
        <div class="user-card-top">
          <div class="avatar ${u.role==='admin'?'admin-avatar':''}">${initials(u.full_name)}</div>
          <div class="user-card-info">
            <div class="uname">${u.full_name} ${isSelf?'<span style="font-size:.72rem;color:var(--accent)">(you)</span>':''}</div>
            <div class="email">${u.email}</div>
          </div>
          <span class="role-badge ${u.role}">${u.role}</span>
        </div>
        <div class="user-card-stats">
          <div class="user-stat"><strong>${stats.count}</strong><br>expenses</div>
          <div class="user-stat"><strong>${fmt(stats.total)}</strong><br>total</div>
          <div class="user-stat"><strong>${u.created_at?.slice(0,10)||'—'}</strong><br>joined</div>
        </div>
        <div class="user-card-actions">
          ${!isSelf ? `<button class="btn-danger" onclick="deleteUser(${u.id})">Delete user</button>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function setAdminTab(tab) { state.adminTab = tab; render(); }

/* ============================================================
   MODAL
   ============================================================ */
function openModal(type, data) {
  state.modal = { type, data: data || {} };
  render();
}
function closeModal() {
  state.modal = null;
  render();
}

function renderModal() {
  const { type, data } = state.modal;
  const today = new Date().toISOString().split('T')[0];

  if (type === 'add' || type === 'edit') {
    const isEdit = type === 'edit';
    const d = isEdit ? data : { amount: '', category: 'food', description: '', date: today };
    return `
    <div class="overlay" id="overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <h2>${isEdit ? 'Edit expense' : 'Add expense'}</h2>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="form-group"><label>Amount (USD)</label><input id="m-amount" type="number" min="0.01" step="0.01" value="${d.amount}" /></div>
        <div class="form-group"><label>Category</label>
          <select id="m-category">
            ${Object.keys(CATS).map(c=>`<option value="${c}" ${d.category===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Description</label><input id="m-desc" type="text" value="${d.description||''}" placeholder="What was this for?" /></div>
        <div class="form-group"><label>Date</label><input id="m-date" type="date" value="${d.date||today}" /></div>
        <div id="modal-err" class="error-msg" style="display:none"></div>
        <div class="modal-footer">
          <button class="btn-save" id="btn-modal-save">${isEdit ? 'Update' : 'Add expense'}</button>
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function overlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

function bindApp() {
  const saveBtn = document.getElementById('btn-modal-save');
  if (!saveBtn) return;
  saveBtn.addEventListener('click', async () => {
    const amount   = parseFloat(document.getElementById('m-amount').value);
    const category = document.getElementById('m-category').value;
    const description = document.getElementById('m-desc').value.trim();
    const date     = document.getElementById('m-date').value;
    const errEl    = document.getElementById('modal-err');
    errEl.style.display = 'none';
    if (!amount || amount <= 0) { errEl.style.display='block'; errEl.textContent='Please enter a valid amount'; return; }
    if (!date) { errEl.style.display='block'; errEl.textContent='Please select a date'; return; }
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      const form = { amount, category, description, date };
      if (state.modal.type === 'edit') await updateExpense(state.modal.data.id, form);
      else await createExpense(form);
    } catch(e) {
      errEl.style.display='block'; errEl.textContent = e.message;
      saveBtn.disabled=false; saveBtn.textContent = state.modal?.type==='edit'?'Update':'Add expense';
    }
  });
}

/* ============================================================
   BOOT
   ============================================================ */
(async () => {
  loadSession();
  if (state.token && state.user) {
    try {
      await fetchDashboard();
    } catch {
      state.token = null; state.user = null; saveSession();
    }
  }
  render();
})();
</script>
</body>
</html>
